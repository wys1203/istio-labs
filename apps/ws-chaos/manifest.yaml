apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-chaos
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels: {app: ws-chaos}
  template:
    metadata:
      labels: {app: ws-chaos}
    spec:
      containers:
      - name: ws-chaos
        image: ws-chaos:dev
        imagePullPolicy: IfNotPresent
        ports:
        - {containerPort: 8080, name: http}
        livenessProbe:
          httpGet: {path: /healthz, port: 8080}
          initialDelaySeconds: 3
        readinessProbe:
          httpGet: {path: /healthz, port: 8080}
        resources:
          requests: {cpu: 50m, memory: 32Mi}
          limits:   {cpu: 500m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: ws-chaos
  namespace: apps
  labels: {app: ws-chaos}
spec:
  selector: {app: ws-chaos}
  ports:
  - {name: http, port: 8080, targetPort: 8080}
