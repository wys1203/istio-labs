kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: istio-lab
nodes:
- role: control-plane
  image: kindest/node:v1.24.17
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  - containerPort: 30443
    hostPort: 8443
    protocol: TCP
- role: worker
  image: kindest/node:v1.24.17
  labels: {role: app}
- role: worker
  image: kindest/node:v1.24.17
  labels: {role: app}
